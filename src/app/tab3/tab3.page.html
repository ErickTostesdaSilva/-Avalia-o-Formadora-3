<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Lista Completa</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-button *ngIf="!exibirLista" (click)="mostrarLista()" expand="block" color="tertiary">
    Apresentar Todos os Produtos
  </ion-button>

  <ion-button *ngIf="exibirLista" (click)="ocultarLista()" expand="block" color="danger">
    Suprimir Lista
  </ion-button>

  <div *ngIf="exibirLista" style="margin-top: 15px;">

    <p style="text-align: center; color: var(--ion-color-medium);">
      Exibindo {{ produtos.length }} produtos encontrados
    </p>

    <ion-card *ngFor="let produto of produtos">
      <div style="display: flex; align-items: center; padding: 10px; background: #fff;">
        <img [src]="produto.image" style="width: 60px; height: 60px; object-fit: contain; margin-right: 15px;" />

        <div>
          <h3 style="font-weight: bold; font-size: 1rem; margin: 0; color: #000;">
            {{ produto.title }}
          </h3>
          <p style="margin: 5px 0 0 0; color: var(--ion-color-success); font-weight: bold;">
            ${{ produto.price }}
          </p>
        </div>
      </div>
    </ion-card>

  </div>

</ion-content>
